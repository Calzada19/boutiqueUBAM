<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Panel Admin</title>
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">PANEL <span>ADMIN</span></h2>

        <nav>
            <a th:href="@{/admin/dashboard}" class="nav-item">Dashboard</a>
            <a th:href="@{/admin/productos}" class="nav-item active">Productos</a>
            <a th:href="@{/admin/categorias}" class="nav-item">Categorías</a>
            <a th:href="@{/admin/agregar}" class="nav-item">Agregar</a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="admin-main">

        <div class="top-bar">
            <a th:href="@{/}">← TIENDA</a>
        </div>

        <h1 class="admin-title">
            PANEL DE <br>
            <span>CONTROL</span>
        </h1>

        <!-- CARDS -->
        <div class="cards">

            <div class="card">
                <h2>📦</h2>
                <p>PRODUCTOS</p>
            </div>

            <div class="card">
                <h2>📂</h2>
                <p>CATEGORÍAS</p>
            </div>

            <div class="card add">
                <h2>+</h2>
                <p>AGREGAR</p>
            </div>

        </div>

    </main>

</div>

</body>
</html>
