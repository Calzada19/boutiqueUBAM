<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Panel Admin</title>
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">PANEL <span>ADMIN</span></h2>

        <nav>
            <a th:href="@{/admin/dashboard}" class="nav-item"
               th:classappend="${active == 'dashboard'} ? 'active'">Dashboard</a>

            <a th:href="@{/admin/productos}" class="nav-item"
               th:classappend="${active == 'productos'} ? 'active'">Productos</a>

            <a th:href="@{/admin/categorias}" class="nav-item"
               th:classappend="${active == 'categorias'} ? 'active'">Categorías</a>

            <a th:href="@{/admin/agregar}" class="nav-item"
               th:classappend="${active == 'agregar'} ? 'active'">Agregar</a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="admin-main">

        <div class="top-bar">
            <a th:href="@{/}">← TIENDA</a>
            <div class="admin-user">
                <span>Admin</span>
            </div>
        </div>

        <h1 class="admin-title">
            PANEL DE <br>
            <span>CONTROL</span>
        </h1>

        <!-- CARDS -->
        <div class="cards">

            <a th:href="@{/admin/productos}" class="card">
                <h2>📦</h2>
                <p>PRODUCTOS</p>
                <span th:text="${totalProductos} ?: 0">0</span>
            </a>

            <a th:href="@{/admin/categorias}" class="card">
                <h2>📂</h2>
                <p>CATEGORÍAS</p>
                <span th:text="${totalCategorias} ?: 0">0</span>
            </a>

            <a th:href="@{/admin/agregar}" class="card add">
                <h2>+</h2>
                <p>AGREGAR</p>
            </a>

        </div>

    </main>

</div>

</body>
</html>
