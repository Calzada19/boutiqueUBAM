<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Agregar Producto</title>
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div class="admin-container">

    <aside class="sidebar">
        <h2 class="logo">PANEL <span>ADMIN</span></h2>

        <nav>
            <a th:href="@{/admin/dashboard}" class="nav-item">Dashboard</a>
            <a th:href="@{/admin/productos}" class="nav-item">Productos</a>
            <a th:href="@{/admin/categorias}" class="nav-item">Categorías</a>
            <a th:href="@{/admin/agregar}" class="nav-item active">Agregar</a>
        </nav>
    </aside>

    <main class="admin-main">

        <div class="top-bar">
            <a th:href="@{/}">← TIENDA</a>
        </div>

        <h1 class="admin-title">
            NUEVO <br>
            <span>PRODUCTO</span>
        </h1>

        <div class="form-card">

            <form th:action="@{/admin/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">

                <label>Nombre</label>
                <input type="text" th:field="*{productoNombre}" class="form-control" placeholder="Nombre" required />

                <label>Descripción</label>
                <textarea th:field="*{productoDescripcion}" class="form-control" placeholder="Descripción"></textarea>

                <label>Precio</label>
                <input type="number" th:field="*{productoPrecio}" step="0.01" class="form-control" />

                <label>Stock</label>
                <input type="number" th:field="*{productoStock}" step="1" class="form-control" />

                <label>SKU</label>
                <input type="text" th:field="*{productoSKU}" class="form-control" />

                <label>Subcategoría</label>
                <select name="subcategoria.subcategoriaId">
                    <option value="">Selecciona</option>
                    <option th:each="s : ${subcategorias}"
                            th:value="${s.SubcategoriaId}"
                            th:text="${s.SubcategoriaNombre}">
                    </option>
                </select>

                <label>Imagen</label>
                <input type="file" name="imagen">

                <button type="submit">Guardar Producto</button>

            </form>

        </div>

    </main>

</div>

</body>
</html>
