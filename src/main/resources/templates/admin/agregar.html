<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Agregar Producto</title>
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">PANEL <span>ADMIN</span></h2>

        <nav>
            <a th:href="@{/admin/dashboard}" class="nav-item">Dashboard</a>
            <a th:href="@{/admin/productos}" class="nav-item">Productos</a>
            <a th:href="@{/admin/categorias}" class="nav-item">Categorías</a>
            <a th:href="@{/admin/agregar}" class="nav-item active">Agregar</a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="admin-main">

        <div class="top-bar">
            <a th:href="@{/}">← TIENDA</a>
        </div>

        <h1 class="admin-title">
            NUEVO <br>
            <span>PRODUCTO</span>
        </h1>

        <!-- FORMULARIO -->
        <div class="form-card">
            <form th:action="@{/admin/guardar}" method="post" enctype="multipart/form-data">

                <input type="text" name="nombre" placeholder="Nombre del producto" required>

                <textarea name="descripcion" placeholder="Descripción" rows="3"></textarea>

                <input type="number" name="precio" placeholder="Precio" required>

                <input type="number" name="stock" placeholder="Stock" required>

                <label>Subcategoría</label>
                <select name="subcategoria">
                    <option value="1">Camisas</option>
                    <option value="2">Pantalones</option>
                    <option value="3">Vestidos</option>
                </select>

                <label>Imagen</label>
                <input type="file" name="imagen">

                <button type="submit">Guardar Producto</button>

            </form>
        </div>

    </main>

</div>

</body>
</html>
