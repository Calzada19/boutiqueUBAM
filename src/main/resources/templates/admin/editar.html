<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Editar Producto</title>
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">PANEL <span>ADMIN</span></h2>

        <nav>
            <a th:href="@{/admin/dashboard}" class="nav-item">Dashboard</a>
            <a th:href="@{/admin/productos}" class="nav-item active">Productos</a>
            <a th:href="@{/admin/categorias}" class="nav-item">Categorías</a>
            <a th:href="@{/admin/agregarProducto}" class="nav-item">Agregar</a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="admin-main">

        <div class="top-bar">
            <a th:href="@{/index}">← TIENDA</a>
        </div>

        <h1 class="admin-title">
            EDITAR <br>
            <span>PRODUCTO</span>
        </h1>

        <!-- FORM -->
        <div class="form-card">
            <form th:action="@{/admin/actualizarProducto}" method="post">

                <input type="hidden" name="id_producto" th:value="${producto.id_producto}">

                <input type="text" name="nombre" th:value="${producto.nombre}" placeholder="Nombre" required>

                <textarea name="descripcion" rows="3" placeholder="Descripción"
                    th:text="${producto.descripcion}"></textarea>

                <input type="number" name="precio" th:value="${producto.precio}" placeholder="Precio" required>

                <input type="number" name="stock" th:value="${producto.stock}" placeholder="Stock" required>

                <button type="submit">Actualizar Producto</button>

            </form>
        </div>

    </main>

</div>

</body>
</html>
