<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Editar Producto</title>
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<h2>Editar Producto</h2>
<form th:action="@{/admin/actualizarProducto}" method="post">
<input type="hidden" name="id_producto" th:value="${producto.id_producto}">
<input type="text" name="nombre" th:value="${producto.nombre}">
<input type="text" name="descripcion" th:value="${producto.descripcion}">
<input type="number" name="precio" th:value="${producto.precio}">
<input type="number" name="stock" th:value="${producto.stock}">
<button type="submit">Actualizar</button>
</form>
</body>
</html>
