<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Producto</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="fragments/navbar :: navbar"></header>

<section class="producto-detalle">

    <!-- IMAGEN -->
    <div class="producto-imagen">
        <img th:src="@{/producto/imagen/{id}(id=${producto.productoId})}">
    </div>

    <!-- INFO -->
    <div class="producto-info">

        <p th:text="${producto.subcategoria != null ? producto.subcategoria.subcategoriaNombre : 'Sin categoría'}"></p>


        <h1 th:text="${producto.productoNombre}"></h1>
        <p th:text="${producto.productoDescripcion}"></p>
        <p th:text="'$' + ${producto.productoPrecio}"></p>

        <!-- STOCK -->
        <p class="stock" th:if="${producto.productoStock > 0}">
            Disponible: <span th:text="${producto.productoStock}"></span>
        </p>

        <p class="stock agotado" th:if="${producto.ProductoStock == 0}">
            Agotado
        </p>

        <!-- BOTÓN -->
        <a th:href="@{/carrito/agregar/{id}(id=${producto.productoId})}"
            class="btn-carrito"
            th:classappend="${producto.productoStock == 0} ? 'disabled'">
             Agregar al carrito
         </a>

    </div>

</section>

</body>
</html>
