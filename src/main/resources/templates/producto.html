<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Producto</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="fragments/navbar :: navbar"></header>

<section class="producto-detalle">

    <!-- IMAGEN -->
    <div class="producto-imagen">
        <img th:src="@{/producto/imagen/{id}(id=${producto.id})}" alt="producto">
    </div>

    <!-- INFO -->
    <div class="producto-info">

        <p class="categoria" th:text="${producto.categoria}"></p>

        <h1 th:text="${producto.nombre}"></h1>

        <p class="precio" th:text="'$' + ${producto.precio}"></p>

        <p class="descripcion" th:text="${producto.descripcion}"></p>

        <!-- STOCK -->
        <p class="stock" th:if="${producto.stock > 0}">
            Disponible: <span th:text="${producto.stock}"></span>
        </p>

        <p class="stock agotado" th:if="${producto.stock == 0}">
            Agotado
        </p>

        <!-- BOTÓN -->
        <a th:href="@{/carrito/agregar/{id}(id=${producto.id})}"
           class="btn-carrito"
           th:classappend="${producto.stock == 0} ? 'disabled'">
            Agregar al carrito
        </a>

    </div>

</section>

</body>
</html>
