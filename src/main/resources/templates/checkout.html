<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div th:if="${success}" class="alert-success">
    <span th:text="${success}"></span>
</div>

<div th:if="${error}" class="alert-error">
    <span th:text="${error}"></span>
</div>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<section class="cart-container">

    <h1>FINALIZAR COMPRA</h1>

    <!-- LISTA DE PRODUCTOS -->
    <div class="cart-items" th:if="${carrito != null}">

    <div class="cart-item" th:each="item : ${carrito}">
        
        <img th:src="@{/producto/imagen/{id}(id=${item.producto.productoId})}"
             onerror="this.src='/img/default.png'">

        <div class="info">
            <h2 th:text="${item.producto.productoNombre}"></h2>
            <p>$<span th:text="${item.producto.productoPrecio}"></span></p>
            <p>Cantidad: <span th:text="${item.cDetalleCantidad}"></span></p>
        </div>

        <div class="actions">
            <a th:href="@{/carrito/eliminar/{id}(id=${item.CDetalleId})}">✕</a>
        </div>

    </div>

</div>

    <!-- TOTAL -->
    <div class="cart-summary">
        <h2>Total: $<span th:text="${total}"></span></h2>
    </div>

    <!-- FORMULARIO -->
    <form th:action="@{/checkout/confirmar}" method="post">

        <button type="submit" class="btn">Confirmar compra</button>

    </form>

</section>

<script>
setTimeout(() => {
    const alert = document.querySelector('.alert-success');
    if(alert){
        alert.style.display = 'none';
    }
}, 3000);
</script>

</body>
</html>
