<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="navbar" th:fragment="navbar">
    <!-- LOGO -->
    <a th:href="@{/}" class="logo">
        URBAN<span>RAW</span>
    </a>
    <!-- MENU -->
    <div class="menu">
        <div class="menu-item">
            <a th:href="@{/productos(categoria='mujer')}">MUJER</a>
            <div class="mega-menu">
                <div class="col">
                    <h4>Colección</h4>
                    <a th:href="@{/productos(subcategoria='playeras')}">Playeras</a>
                    <a th:href="@{/productos(subcategoria='jeans')}">Jeans</a>
                    <a th:href="@{/productos(subcategoria='vestidos')}">Vestidos</a>
                    <a th:href="@{/productos(subcategoria='pantalones')}">Pantalones</a>
                </div>
            </div>
        </div>
        <div class="menu-item">
            <a th:href="@{/productos(categoria='hombre')}">HOMBRE</a>
            <div class="mega-menu">
                <div class="col">
                    <h4>Hombre</h4>
                    <a th:href="@{/productos(subcategoria='playeras')}">Playeras</a>
                    <a th:href="@{/productos(subcategoria='camisas')}">Camisas</a>
                    <a th:href="@{/productos(subcategoria='pantalones')}">Pantalones</a>
                    <a th:href="@{/productos(subcategoria='sudaderas')}">Sudaderas</a>
                </div>
            </div>
        </div>
        <div class="menu-item">
            <a th:href="@{/productos(categoria='ninos')}">NIÑOS</a>
        </div>
    </div>
    <span th:if="${session.usuario != null}">
    Hola, <span th:text="${session.usuario.usuarioNombre}"></span>
</span>
    <!-- ACCIONES -->
    <div class="acciones">
        <a th:if="${session.usuario != null}" th:href="@{/logout}">🚪</a>
        <a th:if="${session.usuario == null}" th:href="@{/login}">👤</a>
        <a th:href="@{/carrito}">🛍</a>
        <!-- ADMIN -->
        <a th:href="@{/admin/dashboard}">⚙</a>
        <!--<a th:if="${session.usuario != null and session.usuario.usuarioTipo == 1}" th:href="@{/admin/dashboard}">⚙</a>-->
    </div>
</header>
</body>
</html>
