<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso - Urban Raw</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

  <div class="left-panel">
    <div class="overlay"></div>

    <div class="content">
      <h1>
        URBAN<br>
        <span>RAW</span>
      </h1>
      <p>Streetwear sin concesiones — EST. 2026</p>
    </div>

    <div class="grid"></div>
  </div>

  <div class="right-panel">

    <div class="form-container">

      <div class="header">
        <h2>Iniciar<br>Sesión</h2>
        <p>Accede para ver tus pedidos y carrito.</p>
      </div>

      <!-- 🔥 FORM CORREGIDO -->
      <form th:action="@{/login}" method="post">

        <div th:if="${error}" style="color:red; margin-bottom:10px;">
          <p th:text="${error}"></p>
        </div>

        <label>Correo</label>
        <input type="email" name="correo" placeholder="tu@correo.com" required>

        <label>Contraseña</label>
        <div class="password-box">
          <input type="password" name="contra" placeholder="••••••••" required>
          <button type="button">👁</button>
        </div>

        <button type="submit" class="btn">Entrar</button>
      </form>

      <div class="divider">
        <span></span>
        <a th:href="@{/registro}">Registrate aqui</a>
        <span></span>
        <a th:href="@{/}">Volver a la tienda</a>
        <span></span>
      </div>

    </div>

  </div>

</div>

</body>
</html>
