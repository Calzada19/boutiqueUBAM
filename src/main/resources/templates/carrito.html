<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="fragments/navbar :: navbar"></header>

<section class="cart-container">

    <h1 class="cart-title">CARRITO</h1>

    <div class="cart-items" th:if="${carrito != null}">

        <div class="cart-item" th:each="item : ${carrito.detalles}">
            
            <img th:src="@{/imagen/{id}(id=${item.producto.ProductoId})}"
                 onerror="this.src='/img/default.png'">

            <div class="info">
                <h2 th:text="${item.producto.productoNombre}"></h2>
                <p>$<span th:text="${item.producto.productoPrecio}"></span></p>
                <p>Cantidad: <span th:text="${item.cDetalleCantidad}"></span></p>
            </div>

            <div class="actions">
                <a th:href="@{/carrito/eliminar/{id}(id=${item.CDetalleId})}">✕</a>
            </div>

        </div>

    </div>

    <div class="cart-summary">
        <h2>Total: $<span th:text="${total} ?: 0">0</span></h2>
        <a th:href="@{/checkout}" class="btn">Finalizar compra</a>
    </div>

</section>

</body>
</html>
