<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="fragments/navbar :: navbar"></header>

<section class="cart-container">

    <h1 class="cart-title">CARRITO</h1>

    <!-- LISTA DE PRODUCTOS -->
    <div class="cart-items">

        <!-- ITEM -->
        <div class="cart-item" th:each="item : ${carrito}">
            
            <img th:src="${item.imagen}" alt="producto">

            <div class="info">
                <h2 th:text="${item.nombre}">Producto</h2>
                <p>$<span th:text="${item.precio}"></span></p>
                <p>Cantidad: <span th:text="${item.cantidad}"></span></p>
            </div>

            <div class="actions">
                <a th:href="@{/carrito/eliminar/{id}(id=${item.id})}">✕</a>
            </div>

        </div>

    </div>

    <!-- TOTAL -->
    <div class="cart-summary">
        <h2>Total: $<span th:text="${total}">0</span></h2>
        <a th:href="@{/checkout}" class="btn">Finalizar compra</a>
    </div>

</section>

</body>
</html>
