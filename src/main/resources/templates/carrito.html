<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar}"></header>

<section class="cart-container">

    <h1 class="cart-title">CARRITO</h1>


    <!-- SI HAY PRODUCTOS -->
    <div class="cart-items" th:if="${carrito != null and !#lists.isEmpty(carrito)}">

    <!-- LISTA DE PRODUCTOS -->
    <div class="cart-items">


        <div class="cart-item" th:each="item : ${carrito}">
            

            <img th:src="@{/producto/imagen/{id}(id=${item.producto.productoId})}"
                 onerror="this.src='/img/default.png'">
            <img th:src="${item.imagen}" alt="producto">

    <!-- SI HAY PRODUCTOS -->
    <div class="cart-items" th:if="${carrito != null and !#lists.isEmpty(carrito)}">

        <div class="cart-item" th:each="item : ${carrito}">
            
            <img th:src="@{/producto/imagen/{id}(id=${item.producto.productoId})}"
                 onerror="this.src='/img/default.png'">


            <div class="info">
                <h2 th:text="${item.producto.productoNombre}"></h2>
                <p>$<span th:text="${item.producto.productoPrecio}"></span></p>
                <p>Cantidad: <span th:text="${item.cDetalleCantidad}"></span></p>
            </div>

            <div class="actions">
                <a th:href="@{/carrito/eliminar/{id}(id=${item.cDetalleId})}">✕</a>
                <a th:href="@{/carrito/eliminar/{id}(id=${item.id})}">✕</a>
                <a th:href="@{/carrito/eliminar/{id}(id=${item.cDetalleId})}">✕</a>
            </div>

        </div>

    </div>
    <!-- SI ESTA VACIO -->
    <div th:if="${carrito == null or #lists.isEmpty(carrito)}">
        <p style="color:#aaa;">Tu carrito está vacío</p>
    </div>


    <!-- TOTAL -->
    <div class="cart-summary">
        <h2>Total: $<span th:text="${total} ?: 0">0</span></h2>
        <a th:href="@{/checkout}" class="btn">Finalizar compra</a>
    </div>

</section>

</body>
</html>
